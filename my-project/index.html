<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Massimo Vignelli Video</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        background: #ffffff;
        overflow: hidden;
        width: 1080px;
        height: 1920px;
        font-family: "Helvetica", Arial, sans-serif;
      }

      /* 6-Column Grid System */
      .grid-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        pointer-events: none;
        z-index: 1000;
        opacity: 0; /* Keep grid invisible but present for layout references */
      }

      .grid-column {
        border-right: 1px solid rgba(204, 0, 0, 0.2); /* Vignelli Red accent */
      }

      #main-composition {
        position: relative;
        width: 1080px;
        height: 1920px;
        background: #ffffff;
        overflow: hidden;
      }

      /* Layer Hosts */
      #a-roll-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        overflow: hidden;
      }

      #a-roll,
      #a-roll-wrapper img.__render_frame__,
      #a-roll-wrapper img.__preview_render_frame__ {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #overlays-comp,
      #captions-comp {
        position: absolute;
        top: 0;
        left: 0;
        width: 1080px;
        height: 1920px;
        pointer-events: none;
      }

      #overlays-comp {
        z-index: 20;
      }

      #captions-comp {
        z-index: 30;
      }

      /* Curtain Transition Layer */
      .curtain {
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #1a1a1a;
        z-index: 25;
        pointer-events: none;
      }

      .curtain.red {
        background: #cc0000;
        z-index: 26;
      }
    </style>
  </head>
  <body>
    <div data-hf-id="hf-iqnt" id="main-composition" data-composition-id="main-comp" data-width="1080" data-height="1920" data-start="0" data-duration="10">
      <!-- Transitions -->
      <div data-hf-id="hf-p9w8" id="curtain-black" class="curtain"></div>
      <div data-hf-id="hf-3q5z" id="curtain-red" class="curtain red"></div>

      <!-- Overlays Composition -->
      <div data-hf-id="hf-0icn" id="overlays-comp" data-composition-id="overlays" data-composition-src="compositions/overlays.html" data-start="0" data-duration="10" data-track-index="2"></div>

      <!-- Captions Composition -->
      <div data-hf-id="hf-kewy" id="captions-comp" data-composition-id="captions" data-composition-src="compositions/captions.html" data-start="0" data-duration="10" data-track-index="3"></div>

      <!-- Grid Visualization -->
      <div data-hf-id="hf-su3a" class="grid-container">
        <div data-hf-id="hf-w12n" class="grid-column"></div>
        <div data-hf-id="hf-zqfj" class="grid-column"></div>
        <div data-hf-id="hf-zc4i" class="grid-column"></div>
        <div data-hf-id="hf-yxth" class="grid-column"></div>
        <div data-hf-id="hf-1pyo" class="grid-column"></div>
        <div data-hf-id="hf-1bnn" class="grid-column"></div>
      </div>

      <script>
        const tl = gsap.timeline({ paused: true });

        // Transition: Curtain Pull logic
        // A-roll leaves the screen at least once.
        // Timing: Let's do a curtain pull at 3.7s (transitioning to the 62% stat)
        // and return at 7.3s (end of attention stat).

        // Curtain Out (A-roll hidden)
        tl.to("#curtain-black", { left: "0%", duration: 0.2, ease: "power2.inOut" }, 3.5);
        tl.to("#a-roll-wrapper", { opacity: 0, duration: 0 }, 3.7);
        tl.to("#curtain-black", { left: "100%", duration: 0.4, ease: "power2.inOut" }, 3.7);

        // Curtain In (A-roll return)
        tl.set("#curtain-red", { left: "-100%" }, 7.1);
        tl.to("#curtain-red", { left: "0%", duration: 0.2, ease: "power2.inOut" }, 7.1);
        tl.to("#a-roll-wrapper", { opacity: 1, duration: 0 }, 7.3);
        tl.to("#curtain-red", { left: "100%", duration: 0.4, ease: "power2.inOut" }, 7.3);

        window.__timelines = window.__timelines || {};
        window.__timelines["main-comp"] = tl;
      </script>
    </div>

    <!-- A-Roll (direct child of body to avoid video_nested_in_timed_element) -->
    <div data-hf-id="hf-w9cw" id="a-roll-wrapper">
      
    </div>
    
  </body>
</html>
